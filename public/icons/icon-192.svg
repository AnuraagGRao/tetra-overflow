<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0d1428"/>
      <stop offset="100%" stop-color="#05060d"/>
    </radialGradient>
    <linearGradient id="lc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0fdff"/>
      <stop offset="40%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#007a85"/>
    </linearGradient>
    <linearGradient id="lp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="40%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <filter id="gc" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00e5ff" flood-opacity="0.9"/>
    </filter>
    <filter id="gp" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.9"/>
    </filter>
  </defs>

  <rect width="192" height="192" rx="38" fill="url(#bg)"/>

  <!-- T crossbar: 3 cyan blocks -->
  <rect x="26"  y="24" width="44" height="44" rx="7" fill="url(#lc)" filter="url(#gc)"/>
  <rect x="26"  y="27" width="28" height="7"  rx="2" fill="rgba(255,255,255,0.28)"/>
  <rect x="74"  y="24" width="44" height="44" rx="7" fill="url(#lc)" filter="url(#gc)"/>
  <rect x="74"  y="27" width="28" height="7"  rx="2" fill="rgba(255,255,255,0.28)"/>
  <rect x="122" y="24" width="44" height="44" rx="7" fill="url(#lc)" filter="url(#gc)"/>
  <rect x="122" y="27" width="28" height="7"  rx="2" fill="rgba(255,255,255,0.28)"/>

  <!-- T stem: 1 purple block -->
  <rect x="74"  y="72" width="44" height="44" rx="7" fill="url(#lp)" filter="url(#gp)"/>
  <rect x="74"  y="75" width="28" height="7"  rx="2" fill="rgba(255,255,255,0.22)"/>

  <!-- {/} symbol -->
  <text x="96" y="162"
    font-family="ui-monospace,'Courier New',monospace"
    font-size="42" font-weight="700"
    fill="none" stroke="#00e5ff" stroke-width="1.8"
    text-anchor="middle" filter="url(#gc)" letter-spacing="3"
  >{/}</text>
</svg>
